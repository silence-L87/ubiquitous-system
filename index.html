<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跳一跳小程序</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-app">
    <header class="hud">
      <h1>跳一跳</h1>
      <p id="scoreText">分数：0</p>
      <p id="tipText">按住屏幕/鼠标蓄力，松开跳跃</p>
    </header>

    <canvas id="gameCanvas" width="420" height="680" aria-label="跳一跳游戏画布"></canvas>

    <footer class="controls">
      <button id="restartBtn">重新开始</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
